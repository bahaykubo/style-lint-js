name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3

      - name: Determine auto-merge eligibility
        id: eligibility
        run: |
          if [ "$ECOSYSTEM" = "github_actions" ] || [ "$UPDATE_TYPE" = "version-update:semver-patch" ] || [ "$UPDATE_TYPE" = "version-update:semver-minor" ]; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}

      - name: Rebase branch if behind base
        if: steps.eligibility.outputs.eligible == 'true'
        run: |
          STATUS=$(gh pr view "$PR_URL" --json mergeStateStatus -q .mergeStateStatus)
          if [ "$STATUS" = "BEHIND" ]; then
            gh pr update-branch "$PR_URL" --rebase
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.eligibility.outputs.eligible == 'true'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
